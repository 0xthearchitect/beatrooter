model:
  provider: ollama
  api_base: http://localhost:11434/v1
  model: mistral
  api_key: null
  timeout: 60

agent:
  max_steps: 6
  show_reasoning: true
  auto_approve_safe_tools: false
  allow_llm_planning: true

safety:
  authorized_use_only: true
  allow_generic_command_execution: false
  require_confirmation_for:
    - nmap
    - gobuster
    - ffuf
    - generic_command
  blocked_keywords:
    - rm
    - mkfs
    - dd
    - hydra
    - metasploit
    - msfconsole
    - sqlmap
    - crackmapexec
  allowed_command_prefixes:
    - echo
    - host
    - dig
    - curl
    - nmap
    - gobuster
    - ffuf

logging:
  level: INFO
  directory: .beatroot/logs

memory:
  directory: .beatroot/sessions

tool_defaults:
  nmap_top_ports: 1000
  web_wordlist: null

scenario:
  enabled: false
  enforce_read_only_context: true
